<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL SOULS | Combate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alasql@4.5.4/dist/alasql.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="flex flex-col h-screen overflow-hidden">

<header class="p-3 border-b border-gray-900 flex justify-between items-center bg-black z-10 shadow-lg">
    <div class="flex items-center gap-4">
        <a href="index.html" class="text-gray-500 hover:text-white mr-2" title="Volver al Vestíbulo"><i class="fa-solid fa-arrow-left"></i></a>
        <span class="cinzel text-gold text-lg tracking-widest glow-text hidden md:block">SQL SOULS</span>
        <div class="flex gap-1 bg-gray-900 p-1 rounded">
            <button onclick="setClass('warrior')" class="text-[9px] border border-red-900 px-2 py-1 text-red-400 hover:bg-red-900/40 uppercase">Guerrero</button>
            <button onclick="setClass('mage')" class="text-[9px] border border-blue-900 px-2 py-1 text-blue-400 hover:bg-blue-900/40 uppercase">Mago</button>
            <button onclick="setClass('hacker')" class="text-[9px] border border-green-900 px-2 py-1 text-green-400 hover:bg-green-900/40 uppercase">Hacker</button>
        </div>
        <div class="text-[10px] text-gray-500 font-bold uppercase hidden lg:block">
            <span id="lvlLabel">NVL 1</span> | <span id="xpLabel">ALMAS: 0</span>
        </div>
    </div>
    <div class="flex gap-2 items-center">
        <input id="apiKey" type="password" class="bg-black border border-gray-800 p-2 text-[10px] w-32 md:w-56 rounded text-gold outline-none" placeholder="GEMINI API KEY">
        <button onclick="localStorage.setItem('sql_key', document.getElementById('apiKey').value); UI.log('<span class=\'text-gold\'>Llave guardada.</span>')" class="hidden md:inline-block text-[9px] border border-gray-600 px-2 py-2 hover:bg-gray-800 text-gray-400 uppercase"><i class="fa-solid fa-key"></i></button>
        <button onclick="Game.save()" class="text-[9px] border border-gold/40 px-3 py-2 text-gold hover:bg-gold/10 uppercase font-bold">Hoguera</button>
    </div>
</header>

<main class="flex flex-1 overflow-hidden flex-col lg:flex-row">
    <aside class="w-full lg:w-72 border-r border-gray-900 p-4 overflow-y-auto bg-[#050506] flex flex-col">
        <div class="panel p-3 border-gold/20 mb-4 bg-black/50">
            <div class="flex justify-between text-[9px] font-bold mb-1"><span>VIGOR</span><span id="hpTxt">100</span></div>
            <div class="h-1 bg-gray-900 mb-2 rounded-full overflow-hidden"><div id="hpBar" class="hp-bar h-full w-full"></div></div>
            <div class="flex justify-between text-[9px] font-bold mb-1"><span>STAMINA</span><span id="spTxt">100</span></div>
            <div class="h-1 bg-gray-900 rounded-full overflow-hidden"><div id="spBar" class="sp-bar h-full w-full"></div></div>
        </div>
        <h3 class="text-[10px] text-gray-600 font-bold uppercase tracking-widest mb-2">Mapa de Gracia</h3>
        <div id="worldMap" class="grid grid-cols-6 lg:grid-cols-4 gap-1.5"></div>
    </aside>

    <section class="flex-1 flex flex-col p-4 gap-4 overflow-hidden relative">
        <div class="panel p-5 border-l-4 border-l-red-900 bg-gradient-to-r from-red-900/10 to-transparent flex-shrink-0">
            <div class="flex justify-between items-start">
                <div>
                    <h2 id="bossName" class="cinzel text-xl text-white tracking-tight glow-text"></h2>
                    <p id="bossTask" class="text-blue-300 text-sm italic mt-1"></p>
                    <div class="mt-3 text-[10px] font-mono p-2 bg-black/60 border border-gray-800 rounded inline-block">
                        <span class="text-gold">SCHEMA:</span> <span id="schemaText" class="text-gray-400"></span>
                    </div>
                </div>
                <div class="text-right">
                    <span id="bossHpText" class="text-3xl font-mono text-red-600 font-bold drop-shadow-md"></span>
                </div>
            </div>
        </div>

        <div class="flex-1 flex gap-4 overflow-hidden flex-col lg:flex-row">
            <div class="flex-1 panel flex flex-col overflow-hidden border border-gray-800">
                <textarea id="sqlInput" class="flex-1 p-4 sql-input text-sm" placeholder="-- Ingresa tu conjuro SQL aquí..."></textarea>
                
                <div class="flex items-center gap-2 p-2 bg-black/90 border-t border-gray-900 z-10">
                    <input id="oracleQ" type="text" class="flex-1 bg-gray-900 border border-gray-800 p-2 text-xs text-purple-300 rounded outline-none" placeholder="Pregunta al Oráculo (ej: ¿Por qué falla mi JOIN?)">
                    <button onclick="Game.oracle(document.getElementById('oracleQ').value)" class="bg-purple-900/20 text-purple-400 border border-purple-900/50 text-[10px] px-4 py-2 font-bold uppercase hover:bg-purple-900/40">🔮 (15 SP)</button>
                </div>
                <button onclick="Game.attack(document.getElementById('sqlInput').value)" class="bg-red-900/20 text-red-500 cinzel py-4 tracking-[0.2em] font-bold border-t border-red-900/30 hover:bg-red-900/40 z-10">EJECUTAR ATAQUE</button>
            </div>
            
            <div class="w-full lg:w-[400px] flex flex-col gap-2">
                <div id="tableContainer" class="panel p-3 overflow-y-auto max-h-[200px] bg-black/60 hidden border-t-2 border-t-blue-800 flex-shrink-0">
                    <div class="text-[9px] text-blue-400 uppercase mb-1">Resultados Mágicos:</div>
                    <div id="dataView"></div>
                </div>
                <div id="logBox" class="flex-1 panel p-4 font-mono text-[11px] overflow-y-auto bg-black/40 flex flex-col gap-2"></div>
            </div>
        </div>
    </section>
</main>

<script src="database.js"></script>
<script src="achievements.js"></script>
<script src="app.js"></script>
</body>
</html>
