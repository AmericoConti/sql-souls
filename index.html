<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Souls - Abismo de Datos</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="./styles.css">
</head>

<body class="p-2 md:p-4 font-mono min-h-screen flex items-center justify-center">

    <div class="w-full max-w-6xl panel p-4 md:p-6 rounded-lg relative">

        <!-- HEADER -->
        <header class="flex justify-between items-center border-b border-gray-800 pb-4 mb-4">
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-red-600 tracking-[0.2em] uppercase">
                    SQL Souls
                </h1>

                <p class="text-[10px] text-gray-500 uppercase">
                    El Abismo de Datos
                </p>
            </div>

            <div class="flex gap-2 flex-wrap justify-end">

                <button
                    id="muteBtn"
                    onclick="AudioSys.toggleMute()"
                    class="bg-gray-900 border border-gray-700 p-2 rounded hover:bg-gray-800 transition"
                    title="Silenciar Música"
                >
                    <i class="fa-solid fa-volume-high"></i>
                </button>

                <button
                    onclick="GameEngine.setClass('warrior')"
                    class="text-[10px] bg-red-900/20 border border-red-900 px-3 py-1 rounded hover:bg-red-900/40 transition"
                >
                    GUERRERO
                </button>

                <button
                    onclick="GameEngine.setClass('mage')"
                    class="text-[10px] bg-blue-900/20 border border-blue-900 px-3 py-1 rounded hover:bg-blue-900/40 transition"
                >
                    MAGO
                </button>
            </div>
        </header>

        <!-- BARRAS -->
        <div class="grid grid-cols-2 gap-6 mb-6">

            <div>
                <div class="flex justify-between text-[10px] mb-1 text-red-500 font-bold uppercase tracking-widest">
                    <span>HP (Integridad)</span>
                    <span id="hpText">150/150</span>
                </div>

                <div class="w-full bg-gray-900 h-1.5 rounded-full overflow-hidden border border-gray-800">
                    <div
                        id="hpBar"
                        class="bg-gradient-to-r from-red-800 to-red-600 h-full transition-all duration-500 shadow-[0_0_10px_rgba(220,38,38,0.5)]"
                        style="width: 100%"
                    ></div>
                </div>
            </div>

            <div>
                <div class="flex justify-between text-[10px] mb-1 text-blue-500 font-bold uppercase tracking-widest">
                    <span>SP (Sincronía)</span>
                    <span id="spText">100/100</span>
                </div>

                <div class="w-full bg-gray-900 h-1.5 rounded-full overflow-hidden border border-gray-800">
                    <div
                        id="spBar"
                        class="bg-gradient-to-r from-blue-800 to-blue-600 h-full transition-all duration-500 shadow-[0_0_10px_rgba(37,99,235,0.5)]"
                        style="width: 100%"
                    ></div>
                </div>
            </div>

        </div>

        <!-- MAIN -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">

            <!-- MAPA -->
            <aside class="md:col-span-2 bg-black/30 border border-gray-800/50 rounded-lg p-4 flex flex-col items-center">

                <span class="text-[9px] text-gray-600 uppercase tracking-[0.3em] mb-6">
                    Mapa
                </span>

                <div
                    id="soulMap"
                    class="flex flex-col gap-2 items-center overflow-y-auto max-h-[400px] w-full custom-scrollbar pr-1"
                ></div>

                <div
                    id="progressPercent"
                    class="text-[9px] text-yellow-800 font-bold mt-6"
                >
                    0%
                </div>

            </aside>

            <!-- CONTENIDO -->
            <main class="md:col-span-10 space-y-4">

                <!-- QUEST -->
                <div class="bg-gradient-to-b from-gray-900/50 to-black p-4 rounded border border-gray-800 shadow-inner">

                    <div class="flex justify-between items-start mb-2">

                        <h2
                            id="questName"
                            class="text-lg font-bold text-yellow-600 tracking-tight"
                        >
                            Misión...
                        </h2>

                        <span
                            id="questLevel"
                            class="text-[9px] text-gray-500 border border-gray-800 px-2 py-0.5 rounded uppercase"
                        >
                            LVL 0
                        </span>

                    </div>

                    <p
                        id="questDesc"
                        class="text-xs text-gray-400 mb-3 italic leading-relaxed"
                    >
                        ...
                    </p>

                    <div class="bg-green-900/5 border border-green-900/20 p-2 rounded">

                        <span class="text-[9px] text-green-700 uppercase font-bold block mb-1">
                            Esquema de Tablas:
                        </span>

                        <p
                            id="questSchema"
                            class="text-[10px] text-green-500 font-mono"
                        >
                            ...
                        </p>

                    </div>

                </div>

                <!-- SQL + LOG -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

                    <!-- INPUT -->
                    <div class="flex flex-col">

                        <textarea
                            id="sqlInput"
                            spellcheck="false"
                            class="w-full h-40 bg-black border border-gray-800 text-green-400 p-4 font-mono text-xs rounded focus:outline-none focus:border-yellow-700 transition-colors shadow-inner"
                            placeholder="-- Escribe tu consulta SQL aquí..."
                        ></textarea>

                        <!-- STATS -->
                        <div class="grid grid-cols-3 gap-2 mt-3">

                            <div class="stat-card">
                                <span class="stat-title">Intentos</span>
                                <span id="attemptCounter" class="stat-value">0</span>
                            </div>

                            <div class="stat-card">
                                <span class="stat-title">Victorias</span>
                                <span id="victoryCounter" class="stat-value">0</span>
                            </div>

                            <div class="stat-card">
                                <span class="stat-title">Precisión</span>
                                <span id="accuracyCounter" class="stat-value">0%</span>
                            </div>

                        </div>

                        <!-- BOTONES -->
                        <div class="flex gap-2 mt-3">

                            <button
                                onclick="GameEngine.attack()"
                                class="flex-1 bg-yellow-700 hover:bg-yellow-600 text-black font-bold py-2 rounded text-xs tracking-widest transition"
                            >
                                EJECUTAR ATAQUE
                            </button>

                            <button
                                onclick="OracleSys.ask()"
                                class="px-6 bg-purple-900/30 border border-purple-800 text-purple-400 hover:bg-purple-900/50 rounded text-xs transition uppercase"
                            >
                                Oráculo
                            </button>

                        </div>

                    </div>

                    <!-- LOG -->
                    <div
                        id="logBox"
                        class="bg-black/60 border border-gray-800 rounded p-3 h-52 overflow-y-auto flex flex-col-reverse text-[10px] font-mono gap-2 custom-scrollbar shadow-inner"
                    ></div>

                </div>

            </main>

        </div>

        <!-- FOOTER -->
        <footer class="mt-6 pt-4 border-t border-gray-800 flex flex-col md:flex-row justify-between items-center gap-4 text-[9px] text-gray-600 tracking-widest uppercase">

            <div class="flex items-center gap-2">

                <i class="fa-solid fa-key text-gray-700"></i>

                <input
                    id="apiKey"
                    type="password"
                    placeholder="GEMINI_API_KEY"
                    class="bg-transparent border-b border-gray-800 focus:border-yellow-900 transition-colors outline-none w-48 text-gray-500"
                >

            </div>

            <div class="opacity-40">
                Desarrollado para el Abismo de Datos v2.0
            </div>

        </footer>

    </div>

    <!-- DEPENDENCIAS -->
    <script src="https://cdn.jsdelivr.net/npm/alasql@4.6/dist/alasql.min.js"></script>

    <!-- SISTEMA -->
    <script src="./quests.js"></script>
    <script src="./database.js"></script>
    <script src="./achievements.js"></script>
    <script src="./app.js"></script>

</body>
</html>
